backend:
  name: github
  repo: servedsmart/servedsmart.top
  branch: cms
  base_url: https://sveltia-cms-auth.servedsmart-6knt8ma96knt8ma9.workers.dev

media_folder: static/img
public_folder: /img

media_libraries:
  default:
    config:
      transformations:
        raster_image: # original format
          format: webp # new format, only `webp` is supported
          quality: 85 # default: 85
          width: 2048 # default: original size
          height: 2048 # default: original size
        svg:
          optimize: true

collections:
  - name: "employees"
    label: "Employees"
    folder: "content/employees"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", default: "{{now}}" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Summary", name: "summary", widget: "string" }
      - {
          label: "Categories",
          name: "categories",
          widget: "list",
          default:
            [
              "digitalisierung",
              "unternehmen",
              "heimkunden",
              "website",
              "iot",
              "netzwerk",
              "smart home",
              "computer",
              "unternehmensintern",
              "rechtliches",
              "ankündigung",
              "dienstleistung"
            ]
        }
      - {
          label: "Tags",
          name: "tags",
          widget: "list",
          default:
            [
              "hugo",
              "internetauftritt",
              "statische website",
              "website design",
              "backup",
              "home assistant",
              "access point",
              "glasfaser",
              "router",
              "wifi",
              "wlan",
              "zigbee",
              "energie",
              "licht",
              "pflanzen",
              "solar",
              "linux",
              "mac",
              "windows",
              "wartung",
              "bedingungen"
            ]
        }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - {
          label: "Body",
          name: "body",
          widget: "markdown",
          modes: ["raw", "rich_text", sanitize_preview: true]
        }
